services:
  postgres:
    image: postgres:16-alpine
    container_name: darfus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-darfus_erp}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # Host port defaults to 5433 to avoid colliding with an installed local PostgreSQL on 5432.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: darfus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: darfus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-darfus_erp}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASSWORD:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379
      # Dev secrets — OVERRIDE these in production (env_file or orchestrator secrets).
      JWT_SECRET: ${JWT_SECRET:-dev_access_secret_change_me_0123456789abcdef0123}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_0123456789abcdef0123}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # First-run admin bootstrap (see README_DEPLOYMENT.md)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@darfus.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-System}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-Admin}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Run migrations (and seed on first boot) before starting the API.
    command: sh -c "npm run db:migrate && npm start"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
